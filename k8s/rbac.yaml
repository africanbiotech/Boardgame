apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-sa
  namespace: devops-demo

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role

metadata:
  namespace: devops-demo
  name: app-role

rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding

metadata:
  name: app-rolebinding
  namespace: devops-demo

subjects:
- kind: ServiceAccount
  name: app-sa
  namespace: devops-demo

roleRef:
  kind: Role
  name: app-role
  apiGroup: rbac.authorization.k8s.io

  # Purpose: Least privilege access

  

